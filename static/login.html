<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SkinScan AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-auth gradient-bg-soft">
    <!-- Animated Background Circles -->
    <div class="blob blob-purple animate-blob" style="top:5rem; left:5rem; width:18rem; height:18rem;"></div>
    <div class="blob blob-indigo animate-blob animation-delay-2000" style="top:10rem; right:5rem; width:18rem; height:18rem;"></div>
    <div class="blob blob-pink animate-blob animation-delay-4000" style="bottom:-5rem; left:10rem; width:18rem; height:18rem;"></div>

    <div class="glass-card">
      <div style="text-align:center; margin-bottom:2rem;">
        <div style="display:inline-flex; align-items:center; justify-content:center; width:5rem; height:5rem; background:linear-gradient(135deg,#4f46e5,#7c3aed); border-radius:1rem; margin-bottom:1rem; box-shadow:0 10px 15px rgba(0,0,0,0.1);">
          <svg width="40" height="40" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/></svg>
        </div>
        <h1 style="color:#111827; margin-bottom:0.5rem;">Doctor Login</h1>
        <p style="color:#4b5563;">Sign in to access your dashboard</p>
      </div>

      <form id="loginForm" style="display:flex; flex-direction:column; gap:1.25rem;">
        <div>
          <label for="hospitalId" class="form-label">Hospital ID</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/></svg>
            <input id="hospitalId" type="text" class="form-input" placeholder="HSP123456" required>
          </div>
        </div>

        <div>
          <label for="password" class="form-label">Password</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="password" type="password" class="form-input" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding:1rem;">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Login
        </button>
      </form>

      <div style="margin-top:1.5rem; text-align:center;">
        <a href="register.html" style="display:block; color:#4f46e5; font-weight:500; margin-bottom:0.75rem;">Don't have an account? Register</a>
        <a href="#" style="display:block; color:#4b5563;">Forgot Password?</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Mock login - redirect to dashboard
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
