<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SkinScan AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-auth gradient-bg-soft">
    <!-- Animated Background Circles -->
    <div class="blob blob-purple animate-blob" style="top:5rem; left:5rem; width:18rem; height:18rem;"></div>
    <div class="blob blob-indigo animate-blob animation-delay-2000" style="top:10rem; right:5rem; width:18rem; height:18rem;"></div>
    <div class="blob blob-pink animate-blob animation-delay-4000" style="bottom:-5rem; left:10rem; width:18rem; height:18rem;"></div>

    <div class="glass-card">
      <div style="text-align:center; margin-bottom:2rem;">
        <div style="display:inline-flex; align-items:center; justify-content:center; width:5rem; height:5rem; background:linear-gradient(135deg,#4f46e5,#7c3aed); border-radius:1rem; margin-bottom:1rem; box-shadow:0 10px 15px rgba(0,0,0,0.1);">
          <svg width="40" height="40" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        <h1 style="color:#111827; margin-bottom:0.5rem;">Doctor Registration</h1>
        <p style="color:#4b5563;">Create your account to get started</p>
      </div>

      <form id="registerForm" style="display:flex; flex-direction:column; gap:1.25rem;">
        <div>
          <label for="email" class="form-label">Email Address</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input id="email" type="email" class="form-input" placeholder="doctor@hospital.com" required>
          </div>
        </div>

        <div>
          <label for="doctorId" class="form-label">Doctor ID</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <input id="doctorId" type="text" class="form-input" placeholder="DR123456" required>
          </div>
        </div>

        <div>
          <label for="password" class="form-label">Password</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="password" type="password" class="form-input" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full" style="padding:1rem;">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Register
        </button>
      </form>

      <div style="margin-top:1.5rem; text-align:center;">
        <a href="login.html" style="display:block; color:#4f46e5; font-weight:500; margin-bottom:0.75rem;">Already have an account? Login</a>
        <a href="#" style="display:block; color:#4b5563;">Forgot Password?</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Mock registration - redirect to login
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
